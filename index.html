<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikisAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══ DARK THEME (default) ══ */
:root, [data-theme="dark"] {
  --bg: #06060a;
  --bg2: #0d0d14;
  --surface: #12121a;
  --surface2: #1a1a24;
  --border: #252530;
  --border2: #32323f;
  --accent: #d4820a;
  --accent2: #e8c97e;
  --accent-dim: rgba(232,201,126,0.12);
  --purple: #8b7ff0;
  --purple-dim: rgba(139,127,240,0.12);
  --text: #eeeae0;
  --text2: #a09c90;
  --muted: #55525f;
  --red: #e07070;
  --green: #4ade80;
  --noise-opacity: 0.5;
  --orb1: rgba(212,130,10,.08);
  --orb2: rgba(139,127,240,.07);
  --orb3: rgba(232,201,126,.05);
  --grid: rgba(139,127,240,.04);
  --topbar-bg: rgba(6,6,10,.92);
  --chat-bg: rgba(3,3,8,.98);
  --chat-input-bg: rgba(6,6,10,.6);
  --ask-bar-bg: rgba(15,15,22,.96);
  --dropdown-bg: rgba(18,18,26,.97);
  --sel-popup-bg: rgba(12,12,20,.97);
  --summary-bg: linear-gradient(135deg,rgba(139,127,240,.08),rgba(212,130,10,.05));
  --summary-border: rgba(139,127,240,.2);
  --wiki-body: #c8c4bc;
  --row-even: rgba(255,255,255,.016);
  --dd-item-border: rgba(37,37,48,.5);
  --shadow-search: 0 12px 50px rgba(0,0,0,.6);
  --shadow-dropdown: 0 24px 70px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.02);
  --shadow-bar: 0 8px 50px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.03);
  --shadow-bar-exp: 0 12px 60px rgba(0,0,0,.8),0 0 40px rgba(139,127,240,.06);
}

/* ══ LIGHT THEME ══ */
[data-theme="light"] {
  --bg: #f7f4ef;
  --bg2: #eeece6;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #dedad2;
  --border2: #cdc9c0;
  --accent: #b86a08;
  --accent2: #d4982a;
  --accent-dim: rgba(184,106,8,0.1);
  --purple: #5d52d4;
  --purple-dim: rgba(93,82,212,0.1);
  --text: #18160f;
  --text2: #52504a;
  --muted: #8a8680;
  --red: #b84040;
  --green: #1e8c44;
  --noise-opacity: 0.12;
  --orb1: rgba(184,106,8,.07);
  --orb2: rgba(93,82,212,.06);
  --orb3: rgba(212,152,42,.05);
  --grid: rgba(93,82,212,.03);
  --topbar-bg: rgba(247,244,239,.96);
  --chat-bg: rgba(247,244,239,.99);
  --chat-input-bg: rgba(238,236,230,.85);
  --ask-bar-bg: rgba(255,255,255,.97);
  --dropdown-bg: rgba(255,255,255,.99);
  --sel-popup-bg: rgba(20,18,14,.96);
  --summary-bg: linear-gradient(135deg,rgba(93,82,212,.06),rgba(184,106,8,.04));
  --summary-border: rgba(93,82,212,.18);
  --wiki-body: #3a3830;
  --row-even: rgba(0,0,0,.025);
  --dd-item-border: rgba(0,0,0,.05);
  --shadow-search: 0 8px 30px rgba(0,0,0,.1);
  --shadow-dropdown: 0 16px 50px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.04);
  --shadow-bar: 0 4px 24px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.04);
  --shadow-bar-exp: 0 8px 40px rgba(0,0,0,.12),0 0 30px rgba(93,82,212,.08);
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;position:relative;transition:background .25s,color .25s;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:var(--noise-opacity);}

.page{position:fixed;inset:0;overflow:hidden;transition:opacity .4s ease,transform .4s ease;}
.page.hidden{opacity:0;pointer-events:none;transform:translateY(18px);}

/* ══ HOME THEME TOGGLE (top-right on home page only) ══ */
.home-theme-btn{
  position:fixed;top:1.1rem;right:1.2rem;z-index:9999;
  background:var(--surface);border:1px solid var(--border2);border-radius:8px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;font-size:.9rem;
}
.home-theme-btn:hover{border-color:var(--accent);color:var(--accent);}
/* Hide home theme btn when article page is visible */
#articlePage:not(.hidden) ~ .home-theme-btn,
body.article-active .home-theme-btn { display: none; }

/* ═══════ HOME PAGE ═══════ */
#homePage{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);}
.home-grid{position:absolute;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);}
.orb{position:absolute;border-radius:50%;filter:blur(130px);pointer-events:none;animation:orbFloat 8s ease-in-out infinite;}
.orb-1{width:700px;height:700px;background:var(--orb1);top:-250px;left:-200px;}
.orb-2{width:600px;height:600px;background:var(--orb2);bottom:-200px;right:-150px;animation-delay:-3s;}
.orb-3{width:350px;height:350px;background:var(--orb3);bottom:80px;left:80px;animation-delay:-6s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}33%{transform:translate(20px,-15px);}66%{transform:translate(-10px,20px);}}

.home-inner{position:relative;z-index:10;width:100%;max-width:680px;padding:2rem;}
.brand{text-align:center;margin-bottom:3.5rem;}
.brand-eyebrow{font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:.8rem;}
.brand-eyebrow::before,.brand-eyebrow::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--border2));}
.brand-eyebrow::after{background:linear-gradient(90deg,var(--border2),transparent);}
.brand-logo{font-family:'Syne',sans-serif;font-size:4.5rem;font-weight:800;color:var(--text);letter-spacing:-.04em;line-height:1;}
.brand-logo em{font-style:italic;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-tagline{margin-top:1rem;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.brand-tagline span{color:var(--text2);}
.brand-stats{display:flex;justify-content:center;gap:2.5rem;margin-top:1.8rem;}
.brand-stat-val{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--text);}
.brand-stat-lbl{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:1px;}

.search-container{position:relative;}
.search-wrapper{position:relative;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.search-wrapper.focused{transform:scale(1.025);}
.search-icon{position:absolute;left:1.2rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none;transition:color .2s;}
.search-wrapper.focused .search-icon{color:var(--accent);}
.search-box{width:100%;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:.95rem;padding:1.2rem 1.4rem 1.2rem 3rem;border-radius:10px;outline:none;transition:border-color .25s,box-shadow .25s;caret-color:var(--accent);}
.search-box::placeholder{color:var(--muted);}
.search-box:focus{border-color:rgba(184,106,8,.55);box-shadow:0 0 0 4px var(--accent-dim),var(--shadow-search);}

.quick-actions{display:flex;justify-content:center;gap:.5rem;margin-top:.9rem;flex-wrap:wrap;}
.qa-chip{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;padding:.38rem .9rem;border:1px solid var(--border2);border-radius:20px;color:var(--text2);background:transparent;cursor:pointer;transition:all .18s;white-space:nowrap;}
.qa-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

.dropdown{position:absolute;top:calc(100% + 10px);left:0;right:0;background:var(--dropdown-bg);border:1px solid var(--border2);border-radius:10px;overflow:hidden;z-index:100;box-shadow:var(--shadow-dropdown);opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .2s,transform .22s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(20px);}
.dropdown.open{opacity:1;transform:translateY(0);pointer-events:all;}
.dropdown-header{padding:.7rem 1.1rem;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;}
.dropdown-item{display:flex;align-items:center;gap:.9rem;padding:.8rem 1.1rem;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--dd-item-border);}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover,.dropdown-item.active{background:var(--surface2);}
.dropdown-item:hover .di-title,.dropdown-item.active .di-title{color:var(--accent);}
.di-icon{width:34px;height:34px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:1px solid var(--border);}
.di-info{flex:1;min-width:0;}
.di-title{font-size:.8rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s;}
.di-desc{font-size:.65rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.di-badge{font-size:.56rem;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:20px;white-space:nowrap;border:1px solid rgba(184,106,8,.2);}
.search-hint{text-align:center;margin-top:1.3rem;font-size:.65rem;color:var(--muted);letter-spacing:.06em;}
.search-hint kbd{background:var(--surface2);border:1px solid var(--border2);padding:1px 7px;border-radius:3px;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text2);}

/* ═══════ ARTICLE PAGE ═══════ */
#articlePage{background:var(--bg);display:flex;flex-direction:column;}
.article-topbar{display:flex;align-items:center;gap:1rem;padding:.8rem 2rem;border-bottom:1px solid var(--border);background:var(--topbar-bg);backdrop-filter:blur(16px);flex-shrink:0;z-index:50;}
.back-btn{display:flex;align-items:center;gap:.4rem;background:none;border:1px solid var(--border);color:var(--text2);font-family:'DM Mono',monospace;font-size:.7rem;padding:.4rem .85rem;border-radius:5px;cursor:pointer;transition:all .2s;letter-spacing:.04em;flex-shrink:0;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.topbar-brand{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--text);letter-spacing:-.02em;flex-shrink:0;}
.topbar-brand em{font-style:italic;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-title{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.topbar-sep{color:var(--border2);font-size:.7rem;flex-shrink:0;}
.topbar-right{display:flex;align-items:center;gap:.55rem;flex-shrink:0;}
.topbar-theme{background:none;border:1px solid var(--border);border-radius:6px;padding:.3rem .55rem;cursor:pointer;color:var(--text2);font-size:.8rem;transition:all .18s;width:34px;height:34px;display:flex;align-items:center;justify-content:center;}
.topbar-theme:hover{border-color:var(--accent);color:var(--accent);}
.summary-btn{display:flex;align-items:center;gap:.45rem;background:linear-gradient(135deg,var(--accent),#a85e06);color:#fff;font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:.5rem 1.1rem;border:none;border-radius:5px;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap;box-shadow:0 2px 12px rgba(184,106,8,.3);}
.summary-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(184,106,8,.45);}
.summary-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}

.article-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.article-scroll::-webkit-scrollbar{width:3px;}
.article-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.article-wrap{width:100%;max-width:100%;padding:2.5rem 5vw 8rem;}

.summary-banner{background:var(--summary-bg);border:1px solid var(--summary-border);border-radius:10px;padding:1.6rem 2rem;margin-bottom:2.5rem;position:relative;overflow:hidden;}
.summary-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--accent));}
.summary-label{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--purple);margin-bottom:.8rem;display:flex;align-items:center;gap:.45rem;}
.summary-body{font-family:'Cormorant Garamond',serif;font-size:1.08rem;line-height:1.9;color:var(--text);font-style:italic;}

.article-h1{font-family:'Syne',sans-serif;font-size:2.6rem;font-weight:800;line-height:1.12;color:var(--text);margin-bottom:.8rem;letter-spacing:-.03em;}
.article-meta-bar{display:flex;align-items:center;gap:1.2rem;font-size:.63rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:2rem;flex-wrap:wrap;}
.article-meta-bar a{color:var(--accent);text-decoration:none;}
.article-meta-bar a:hover{text-decoration:underline;}

.wiki-content{font-size:.88rem;line-height:2;color:var(--wiki-body);}
.wiki-content h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--text);margin:2.8rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);letter-spacing:-.02em;}
.wiki-content h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--text);margin:2rem 0 .75rem;}
.wiki-content h4{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--text2);margin:1.5rem 0 .5rem;}
.wiki-content p{margin-bottom:1.1rem;color:var(--wiki-body);}
.wiki-content a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(184,106,8,.25);transition:border-color .15s;}
.wiki-content a:hover{border-color:var(--accent);}
.wiki-content img{max-width:100%;height:auto;border-radius:6px;display:block;}
.wiki-content figure,.wiki-content .thumb{float:right;max-width:280px;margin:0 0 1.5rem 2.5rem;font-size:.72rem;color:var(--muted);clear:right;}
.wiki-content figcaption,.wiki-content .thumbcaption{margin-top:.4rem;font-size:.72rem;line-height:1.5;}
.wiki-content table{border-collapse:collapse;margin:1.5rem 0;width:100%;font-size:.78rem;display:block;overflow-x:auto;}
.wiki-content th,.wiki-content td{padding:.55rem .8rem;border:1px solid var(--border);}
.wiki-content th{background:var(--surface2);color:var(--accent);font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;}
.wiki-content tr:nth-child(even) td{background:var(--row-even);}
.wiki-content ul,.wiki-content ol{padding-left:1.6rem;margin-bottom:1rem;}
.wiki-content li{margin-bottom:.35rem;color:var(--wiki-body);}
.wiki-content blockquote{border-left:2px solid var(--accent);padding:.6rem 1.1rem;margin:1rem 0;color:var(--text2);font-style:italic;}
.wiki-content sup{font-size:.65em;}
.wiki-content .mw-editsection,.wiki-content .navbox,.wiki-content .mw-references-wrap,.wiki-content .reflist,.wiki-content .hatnote,.wiki-content .sistersitebox,.wiki-content .ambox,.wiki-content .noprint,.wiki-content .portal{display:none!important;}

/* selection popup */
.selection-popup{position:fixed;z-index:2000;background:var(--sel-popup-bg);border:1px solid var(--border2);border-radius:8px;padding:.35rem .4rem;display:flex;gap:.3rem;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transform:translateY(6px) scale(.96);transition:opacity .15s,transform .15s;backdrop-filter:blur(12px);}
.selection-popup.show{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
.sel-btn{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;padding:.38rem .85rem;border-radius:5px;border:none;cursor:pointer;transition:all .15s;font-weight:500;}
.sel-btn.copy{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.sel-btn.copy:hover{color:var(--text);}
.sel-btn.summarize{background:linear-gradient(135deg,var(--accent),#a85e06);color:#fff;}
.sel-btn.summarize:hover{box-shadow:0 3px 12px rgba(184,106,8,.4);}

.load-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:1.5rem;color:var(--muted);}
.load-ring{width:38px;height:38px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
.load-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── FLOATING ASK BAR ── */
.ask-bar-outer{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);width:min(720px,calc(100vw - 2rem));z-index:200;transition:opacity .3s,transform .3s;}
.ask-bar-outer.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(14px);}
.ask-bar{background:var(--ask-bar-bg);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:14px;padding:.65rem .65rem .65rem 1.4rem;display:flex;align-items:center;gap:.6rem;box-shadow:var(--shadow-bar);transition:all .35s cubic-bezier(.34,1.3,.64,1);position:relative;}
.ask-bar.expanded{border-color:rgba(93,82,212,.35);box-shadow:var(--shadow-bar-exp);padding-bottom:3.8rem;border-radius:16px;flex-wrap:wrap;}
.ask-bar-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.87rem;caret-color:var(--purple);min-width:0;}
.ask-bar-input::placeholder{color:var(--muted);}
.ask-bar-btn{background:linear-gradient(135deg,var(--purple),#a898ff);color:#fff;border:none;border-radius:10px;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:.6rem 1.2rem;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.ask-bar-btn:hover{box-shadow:0 4px 18px rgba(93,82,212,.45);transform:translateY(-1px);}
.ask-quick-chips{position:absolute;bottom:.65rem;left:1.4rem;display:flex;gap:.45rem;flex-wrap:wrap;opacity:0;transform:translateY(6px);pointer-events:none;transition:opacity .25s .1s,transform .25s .1s;}
.ask-bar.expanded .ask-quick-chips{opacity:1;transform:translateY(0);pointer-events:all;}
.ask-quick-chip{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.06em;padding:.3rem .75rem;border:1px solid var(--border2);border-radius:20px;color:var(--text2);background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
.ask-quick-chip:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-dim);}

/* ═══════ CHAT PANEL ═══════ */
#chatPopup{position:fixed;inset:0;z-index:1000;background:var(--chat-bg);backdrop-filter:blur(24px);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s ease;}
#chatPopup.open{opacity:1;pointer-events:all;}
.chat-popup-header{display:flex;align-items:center;gap:1rem;padding:1rem 2rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--topbar-bg);}
.chat-status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px rgba(74,222,128,.6);flex-shrink:0;animation:cpulse 2s infinite;}
@keyframes cpulse{0%,100%{box-shadow:0 0 8px rgba(74,222,128,.5);}50%{box-shadow:0 0 18px rgba(74,222,128,.9);}}
.chat-header-info{flex:1;min-width:0;}
.chat-header-label{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
.chat-topic{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-close{background:none;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.chat-close:hover{border-color:var(--red);color:var(--red);background:rgba(184,64,64,.06);}
.chat-body{flex:1;overflow:hidden;display:flex;flex-direction:column;max-width:860px;width:100%;margin:0 auto;}
.chat-messages{flex:1;overflow-y:auto;padding:1.8rem 2rem 1rem;display:flex;flex-direction:column;gap:1.5rem;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.suggested-qs{padding:.5rem 2rem .8rem;display:flex;gap:.5rem;flex-wrap:wrap;}
.sq-chip{font-family:'DM Mono',monospace;font-size:.65rem;padding:.32rem .85rem;border:1px solid var(--border2);border-radius:20px;color:var(--text2);cursor:pointer;background:transparent;transition:all .15s;white-space:nowrap;}
.sq-chip:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-dim);}
.msg{display:flex;gap:.85rem;animation:msgIn .3s cubic-bezier(.34,1.4,.64,1);}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.msg.user{flex-direction:row-reverse;}
.msg.user .msg-bubble{background:var(--accent-dim);border-color:rgba(184,106,8,.2);border-radius:18px 4px 18px 18px;}
.msg.ai .msg-bubble{background:var(--purple-dim);border-color:rgba(93,82,212,.2);border-radius:4px 18px 18px 18px;}
.msg-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.65rem;font-weight:700;flex-shrink:0;margin-top:2px;}
.msg.user .msg-av{background:linear-gradient(135deg,var(--accent),#a85e06);color:#fff;}
.msg.ai .msg-av{background:linear-gradient(135deg,#6c5ff0,#b0a5ff);color:#fff;}
.msg-bubble{max-width:78%;padding:.9rem 1.15rem;font-size:.84rem;line-height:1.8;word-break:break-word;border:1px solid;color:var(--text);}
.msg-bubble strong{color:var(--text);}
.msg-bubble code{background:var(--surface2);padding:1px 6px;border-radius:4px;font-size:.8em;border:1px solid var(--border);}
.msg-bubble em{color:var(--text2);}
.msg-bubble p{margin-bottom:.5rem;}
.msg-bubble p:last-child{margin-bottom:0;}
.msg-meta{font-size:.58rem;color:var(--muted);margin-top:.4rem;letter-spacing:.05em;}
.msg.user .msg-meta{text-align:right;}
.typing-dots{display:flex;gap:5px;padding:4px 2px;}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:tdot 1.4s infinite;}
.typing-dots span:nth-child(2){animation-delay:.18s;}
.typing-dots span:nth-child(3){animation-delay:.36s;}
@keyframes tdot{0%,70%,100%{transform:translateY(0) scale(1);opacity:.3;}35%{transform:translateY(-6px) scale(1.1);opacity:1;}}
.cursor-blink{display:inline-block;width:2px;height:1em;background:var(--purple);vertical-align:text-bottom;margin-left:2px;animation:blink .8s infinite;}
@keyframes blink{0%,50%{opacity:1;}51%,100%{opacity:0;}}
.chat-input-area{padding:1rem 2rem 1.5rem;border-top:1px solid var(--border);background:var(--chat-input-bg);}
.chat-input-row{display:flex;gap:.6rem;align-items:flex-end;}
.chat-input-wrap{flex:1;}
.chat-input{width:100%;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:.84rem;padding:.85rem 1.1rem;border-radius:10px;outline:none;resize:none;transition:border-color .2s,box-shadow .2s;caret-color:var(--purple);display:block;min-height:48px;max-height:120px;scrollbar-width:none;}
.chat-input::placeholder{color:var(--muted);}
.chat-input:focus{border-color:rgba(93,82,212,.5);box-shadow:0 0 0 3px var(--purple-dim);}
.chat-input:disabled{opacity:.4;}
.chat-send{background:linear-gradient(135deg,var(--purple),#a898ff);color:#fff;border:none;border-radius:10px;width:46px;height:46px;font-size:1.1rem;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chat-send:hover{box-shadow:0 4px 22px rgba(93,82,212,.45);transform:translateY(-1px);}
.chat-send:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.chat-hint{font-size:.6rem;color:var(--muted);margin-top:.5rem;text-align:center;letter-spacing:.05em;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
.err-bar{background:rgba(184,64,64,.08);border:1px solid rgba(184,64,64,.25);color:var(--red);padding:.6rem 1rem;border-radius:6px;font-size:.75rem;margin:.5rem 2rem;}
.copy-toast{position:fixed;bottom:2rem;right:2rem;z-index:3000;background:rgba(30,140,68,.12);border:1px solid rgba(30,140,68,.3);color:var(--green);font-family:'DM Mono',monospace;font-size:.72rem;padding:.6rem 1.1rem;border-radius:6px;opacity:0;transform:translateY(8px);pointer-events:none;transition:all .2s;}
.copy-toast.show{opacity:1;transform:translateY(0);}

@media(max-width:700px){
  .article-wrap{padding:1.8rem 1rem 8rem;}
  .article-h1{font-size:1.8rem;}
  .ask-bar-outer{bottom:1rem;}
  .chat-messages,.chat-input-area,.suggested-qs{padding-left:1rem;padding-right:1rem;}
  .article-topbar{padding:.8rem 1rem;gap:.6rem;}
  .brand-logo{font-size:3.2rem;}
  .brand-stats{gap:1.5rem;}
  .msg-bubble{max-width:90%;}
  .chat-body{max-width:100%;}
}
</style>
</head>
<body>

<!-- Home page theme toggle (only shown on home page) -->
<button class="home-theme-btn" id="homeThemeBtn" onclick="toggleTheme()">
  <span id="homeThemeIcon">🌙</span>
</button>

<!-- ═══ HOME ════════════════════════════════════ -->
<div id="homePage" class="page">
  <div class="home-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="home-inner">
    <div class="brand">
      <div class="brand-eyebrow">Powered by Wikipedia & AI</div>
      <div class="brand-logo">Wikis<em>AI</em></div>
      <div class="brand-tagline">Read &nbsp;<span>·</span>&nbsp; Understand &nbsp;<span>·</span>&nbsp; Explore</div>
      <div class="brand-stats">
        <div class="brand-stat"><div class="brand-stat-val">60M+</div><div class="brand-stat-lbl">Articles</div></div>
        <div class="brand-stat"><div class="brand-stat-val">AI</div><div class="brand-stat-lbl">Powered</div></div>
        <div class="brand-stat"><div class="brand-stat-val">∞</div><div class="brand-stat-lbl">Knowledge</div></div>
      </div>
    </div>
    <div class="search-container">
      <div class="search-wrapper" id="searchWrapper">
        <span class="search-icon">⌕</span>
        <input id="homeSearch" class="search-box" type="text" placeholder="Search any Wikipedia article…" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="dropdown" id="dropdown">
        <div class="dropdown-header" id="dropdownHeader">🔥 Trending on Wikipedia</div>
        <div id="dropdownList"></div>
      </div>
    </div>
    <div class="quick-actions">
      <button class="qa-chip" onclick="loadArticle('Artificial intelligence')">🤖 Artificial Intelligence</button>
      <button class="qa-chip" onclick="loadArticle('Black hole')">🌑 Black Holes</button>
      <button class="qa-chip" onclick="loadArticle('Pakistan')">🌍 Pakistan</button>
      <button class="qa-chip" onclick="loadArticle('Quantum mechanics')">⚛️ Quantum Mechanics</button>
      <button class="qa-chip" onclick="loadArticle('Human brain')">🧠 Human Brain</button>
    </div>
    <div class="search-hint">Press <kbd>Enter</kbd> to search &nbsp;·&nbsp; <kbd>↑↓</kbd> to navigate &nbsp;·&nbsp; <kbd>Esc</kbd> to close</div>
  </div>
</div>

<!-- ═══ ARTICLE PAGE ════════════════════════════ -->
<div id="articlePage" class="page hidden">
  <div class="article-topbar">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="topbar-brand">Wikis<em>AI</em></div>
    <div class="topbar-sep">›</div>
    <div class="topbar-title" id="topbarTitle">—</div>
    <div class="topbar-right">
      <button class="topbar-theme" id="topbarTheme" onclick="toggleTheme()" title="Toggle theme">☀️</button>
      <button class="summary-btn" id="summaryBtn" onclick="generateSummary()">✦ AI Summary</button>
    </div>
  </div>
  <div class="article-scroll" id="articleScroll">
    <div class="article-wrap" id="articleWrap">
      <div class="load-state"><div class="load-ring"></div><div class="load-label">Fetching article…</div></div>
    </div>
  </div>
  <div class="ask-bar-outer hidden" id="askBarOuter">
    <div class="ask-bar" id="askBar">
      <input id="askBarInput" class="ask-bar-input" type="text" placeholder="Ask anything about this article…"/>
      <button class="ask-bar-btn" onclick="openChatFromBar()">Ask AI ↑</button>
      <div class="ask-quick-chips">
        <button class="ask-quick-chip" onclick="askQuick('Summarize this article briefly')">✦ Summarize</button>
        <button class="ask-quick-chip" onclick="askQuick('What are the key questions about this topic?')">❓ Questions</button>
        <button class="ask-quick-chip" onclick="askQuick('What are the key facts and most important points?')">📌 Key Facts</button>
        <button class="ask-quick-chip" onclick="askQuick('What are the main controversies or debates around this topic?')">⚡ Controversies</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ CHAT POPUP ══════════════════════════════ -->
<div id="chatPopup">
  <div class="chat-popup-header">
    <div class="chat-status-dot"></div>
    <div class="chat-header-info">
      <div class="chat-header-label">Chatting about</div>
      <div class="chat-topic" id="chatTopic">—</div>
    </div>
    <!-- Close button: returns to article page -->
    <button class="chat-close" onclick="closeChat()" title="Back to article">✕</button>
  </div>
  <div class="chat-body">
    <div class="suggested-qs" id="suggestedQs"></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div id="chatError"></div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <div class="chat-input-wrap">
          <textarea id="chatInput" class="chat-input" placeholder="Ask anything about this article…" disabled rows="1"></textarea>
        </div>
        <button class="chat-send" id="chatSend" onclick="sendChat()" disabled>↑</button>
      </div>
      <div class="chat-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>
  </div>
</div>

<div class="selection-popup" id="selectionPopup">
  <button class="sel-btn copy" onclick="copySelected()">📋 Copy</button>
  <button class="sel-btn summarize" onclick="summarizeSelected()">✦ Ask AI</button>
</div>
<div class="copy-toast" id="copyToast">✓ Copied to clipboard</div>

<script>
const TOGETHER_MODEL = 'mistralai/Mistral-Small-24B-Instruct-2501';
const WIKI_API = 'https://en.wikipedia.org/w/api.php?origin=*';

/* ── STATE ── */
let article = null;
let chatHistory = [];
let dropdownItems = [], ddIndex = -1, searchTimer = null;

/* ══ THEME ══ */
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('wikisai-theme', next);
  syncThemeIcons(next);
}
function syncThemeIcons(t) {
  // Home floating button: show sun in dark mode, moon in light mode
  document.getElementById('homeThemeIcon').textContent = t === 'dark' ? '☀️' : '🌙';
  // Article topbar button: opposite icon (shows what you'll switch TO)
  const tb = document.getElementById('topbarTheme');
  if (tb) tb.textContent = t === 'dark' ? '☀️' : '🌙';
}
(function(){
  const s = localStorage.getItem('wikisai-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', s);
  syncThemeIcons(s);
})();

/* ── show/hide home theme btn based on current page ── */
function updateHomeThemeBtn() {
  const homeThemeBtn = document.getElementById('homeThemeBtn');
  const isArticlePage = !document.getElementById('articlePage').classList.contains('hidden');
  homeThemeBtn.style.display = isArticlePage ? 'none' : '';
}

/* ── TRENDING ── */
const TRENDING = [
  { title:'Black hole',desc:'Stellar objects with extreme gravity',icon:'🌑' },
  { title:'Artificial intelligence',desc:'Machine learning & neural networks',icon:'🤖' },
  { title:'Roman Empire',desc:'Ancient Mediterranean civilization',icon:'🏛️' },
  { title:'Pakistan',desc:'South Asian nation, history & culture',icon:'🌍' },
  { title:'Quantum mechanics',desc:'Physics at subatomic scale',icon:'⚛️' },
  { title:'Alan Turing',desc:'Father of computer science',icon:'💻' },
  { title:'Climate change',desc:'Global temperature & environment',icon:'🌡️' },
  { title:'Human brain',desc:'Neuroscience and cognition',icon:'🧠' },
];

/* ── SEARCH ── */
const homeSearch = document.getElementById('homeSearch');
const dropdown = document.getElementById('dropdown');
const ddList = document.getElementById('dropdownList');
const ddHeader = document.getElementById('dropdownHeader');
const searchWrapper = document.getElementById('searchWrapper');

homeSearch.addEventListener('focus', () => { searchWrapper.classList.add('focused'); showTrending(); });
homeSearch.addEventListener('blur', () => searchWrapper.classList.remove('focused'));
homeSearch.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = homeSearch.value.trim();
  if (!q) { showTrending(); return; }
  searchTimer = setTimeout(() => searchDropdown(q), 280);
});
homeSearch.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') { e.preventDefault(); moveDd(1); return; }
  if (e.key === 'ArrowUp') { e.preventDefault(); moveDd(-1); return; }
  if (e.key === 'Enter') { e.preventDefault(); if (ddIndex >= 0 && dropdownItems[ddIndex]) loadArticle(dropdownItems[ddIndex].title); else if (homeSearch.value.trim()) loadArticle(homeSearch.value.trim()); return; }
  if (e.key === 'Escape') closeDropdown();
});
document.addEventListener('click', e => { if (!e.target.closest('.search-container')) closeDropdown(); });

function showTrending() {
  ddHeader.textContent = '🔥 Trending on Wikipedia';
  ddList.innerHTML = '';
  dropdownItems = TRENDING; ddIndex = -1;
  TRENDING.forEach((item, i) => ddList.appendChild(makeDdItem(item.icon, item.title, item.desc, 'trending', i)));
  dropdown.classList.add('open');
}
async function searchDropdown(q) {
  ddHeader.textContent = '🔍 Searching…';
  ddList.innerHTML = '';
  dropdown.classList.add('open');
  try {
    const data = await (await fetch(`${WIKI_API}&action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&srlimit=6`)).json();
    const results = data.query.search;
    if (!results.length) { ddHeader.textContent = 'No results found'; return; }
    ddHeader.textContent = `📄 Results for "${q}"`;
    dropdownItems = results.map(r => ({ title: r.title, desc: stripHtml(r.snippet) }));
    ddIndex = -1;
    dropdownItems.forEach((item, i) => ddList.appendChild(makeDdItem('📄', item.title, item.desc, 'result', i)));
  } catch { ddHeader.textContent = 'Search error'; }
}
function makeDdItem(icon, title, desc, type, idx) {
  const el = document.createElement('div');
  el.className = 'dropdown-item';
  el.innerHTML = `<div class="di-icon">${icon}</div><div class="di-info"><div class="di-title">${escHtml(title)}</div><div class="di-desc">${escHtml(desc)}</div></div>${type==='trending'?'<div class="di-badge">Trending</div>':''}`;
  el.addEventListener('click', () => loadArticle(title));
  el.addEventListener('mouseenter', () => { ddIndex = idx; highlightDd(); });
  return el;
}
function moveDd(dir) { ddIndex = Math.max(-1, Math.min(dropdownItems.length-1, ddIndex+dir)); highlightDd(); if (ddIndex>=0&&dropdownItems[ddIndex]) homeSearch.value = dropdownItems[ddIndex].title; }
function highlightDd() { ddList.querySelectorAll('.dropdown-item').forEach((el,i) => el.classList.toggle('active', i===ddIndex)); }
function closeDropdown() { dropdown.classList.remove('open'); ddIndex = -1; }

/* ── LOAD ARTICLE ── */
async function loadArticle(query) {
  closeDropdown();
  showArticlePage();
  document.getElementById('topbarTitle').textContent = query;
  document.getElementById('summaryBtn').disabled = true;
  document.getElementById('askBarOuter').classList.add('hidden');
  document.getElementById('articleWrap').innerHTML = `<div class="load-state"><div class="load-ring"></div><div class="load-label">Fetching "${escHtml(query)}"…</div></div>`;
  article = null; chatHistory = [];

  try {
    const sr = await (await fetch(`${WIKI_API}&action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&srlimit=1`)).json();
    if (!sr.query.search.length) throw new Error(`No Wikipedia article found for "${query}"`);
    const pageTitle = sr.query.search[0].title;

    const pd = await (await fetch(`${WIKI_API}&action=parse&page=${encodeURIComponent(pageTitle)}&prop=text&format=json&disableeditsection=1`)).json();
    if (pd.error) throw new Error(pd.error.info);
    const html = pd.parse.text['*'];
    const title = pd.parse.title;

    const ex = await (await fetch(`${WIKI_API}&action=query&titles=${encodeURIComponent(pageTitle)}&prop=extracts&explaintext=1&exlimit=1&format=json`)).json();
    const pages = ex.query.pages;
    const plainText = pages[Object.keys(pages)[0]].extract || '';
    const wikiUrl = `https://en.wikipedia.org/wiki/${encodeURIComponent(pageTitle.replace(/ /g,'_'))}`;

    article = { title, plainText, url: wikiUrl };

    document.getElementById('topbarTitle').textContent = title;
    const fixed = html
      .replace(/href="\/wiki\//g, 'href="https://en.wikipedia.org/wiki/')
      .replace(/src="\/\//g, 'src="https://')
      .replace(/srcset="[^"]*"/g, '');
    const readTime = Math.max(1, Math.round(plainText.split(/\s+/).length / 200));

    document.getElementById('articleWrap').innerHTML = `
      <div id="summaryContainer"></div>
      <h1 class="article-h1">${escHtml(title)}</h1>
      <div class="article-meta-bar">
        <span>Wikipedia</span>
        <a href="${wikiUrl}" target="_blank" rel="noopener">Open source ↗</a>
        <span>~${readTime} min read</span>
        <span>${Math.round(plainText.length/1000)}k chars</span>
      </div>
      <div class="wiki-content" id="wikiContent">${fixed}</div>
    `;
    document.querySelectorAll('.wiki-content .mw-editsection,.wiki-content .navbox,.wiki-content .mw-references-wrap,.wiki-content .reflist,.wiki-content .hatnote,.wiki-content .sistersitebox,.wiki-content .ambox,.wiki-content .noprint,.wiki-content .portal').forEach(el => el.remove());
    document.querySelectorAll('.wiki-content a').forEach(a => { if (a.href.includes('wikipedia.org')) { a.target='_blank'; a.rel='noopener'; } });

    document.getElementById('summaryBtn').disabled = false;
    document.getElementById('askBarOuter').classList.remove('hidden');
    document.getElementById('articleScroll').scrollTo(0, 0);
  } catch(err) {
    document.getElementById('articleWrap').innerHTML = `<div class="load-state" style="color:var(--red)"><div style="font-size:2rem">⚠</div><div class="load-label">${escHtml(err.message)}</div></div>`;
  }
}

function showArticlePage() {
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('articlePage').classList.remove('hidden');
  updateHomeThemeBtn();
}
function goHome() {
  document.getElementById('articlePage').classList.add('hidden');
  document.getElementById('homePage').classList.remove('hidden');
  closeChat();
  article = null;
  chatHistory = [];
  updateHomeThemeBtn();
}

/* ── ASK BAR ── */
const askBarInput = document.getElementById('askBarInput');
const askBarEl = document.getElementById('askBar');
askBarInput.addEventListener('focus', () => askBarEl.classList.add('expanded'));
askBarInput.addEventListener('blur', () => setTimeout(() => askBarEl.classList.remove('expanded'), 200));
askBarInput.addEventListener('keydown', e => { if (e.key === 'Enter') openChatFromBar(); });
function openChatFromBar() { openChat(askBarInput.value.trim()); }
function askQuick(q) { askBarInput.value = q; openChat(q); }

/* ── SELECTION ── */
let selectedText = '';
const selPopup = document.getElementById('selectionPopup');
document.addEventListener('mouseup', e => {
  if (e.target.closest('#selectionPopup') || e.target.closest('#chatPopup')) return;
  setTimeout(() => {
    const sel = window.getSelection();
    const text = sel ? sel.toString().trim() : '';
    if (text.length > 8) {
      selectedText = text;
      const rect = sel.getRangeAt(0).getBoundingClientRect();
      let x = rect.left + rect.width/2 - 100, y = rect.top - 52;
      x = Math.max(8, Math.min(x, window.innerWidth - 208));
      if (y < 8) y = rect.bottom + 8;
      selPopup.style.left = x+'px'; selPopup.style.top = y+'px';
      selPopup.classList.add('show');
    } else selPopup.classList.remove('show');
  }, 10);
});
document.addEventListener('mousedown', e => { if (!e.target.closest('#selectionPopup')) selPopup.classList.remove('show'); });
function copySelected() {
  navigator.clipboard.writeText(selectedText).then(() => {
    selPopup.classList.remove('show');
    const t = document.getElementById('copyToast');
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200);
  });
}
function summarizeSelected() {
  selPopup.classList.remove('show');
  if (selectedText) openChat(`Please explain and summarize this passage: "${selectedText.slice(0,500)}"`);
}

/* ── AI SUMMARY ── */
async function generateSummary() {
  if (!article) return;
  const btn = document.getElementById('summaryBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Summarizing…';
  const container = document.getElementById('summaryContainer');
  container.innerHTML = `<div class="summary-banner"><div class="summary-label">✦ AI Summary</div><div class="summary-body"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  try {
    const ctx = article.plainText.slice(0, 20000);
    const reply = await callAI([
      { role:'system', content:`You are summarizing a Wikipedia article. Use ONLY the article text provided — it may contain information more recent than your training. Be specific: include key facts, dates, figures.\n\nArticle: "${article.title}"\n\n${ctx}` },
      { role:'user', content:'Write a clear 3–4 paragraph prose summary. No bullet points, no headers.' }
    ]);
    container.innerHTML = `<div class="summary-banner"><div class="summary-label">✦ AI Summary — ${escHtml(article.title)}</div>${reply.split('\n\n').filter(p=>p.trim()).map(p=>`<div class="summary-body" style="margin-bottom:.8rem">${escHtml(p.trim())}</div>`).join('')}</div>`;
    document.getElementById('articleScroll').scrollTo({ top:0, behavior:'smooth' });
  } catch(e) {
    container.innerHTML = `<div class="err-bar" style="margin:0 0 1rem">Summary failed: ${escHtml(e.message)}</div>`;
  } finally { btn.disabled = false; btn.innerHTML = '✦ AI Summary'; }
}

/* ── CHAT ── */
function openChat(initialQ = '') {
  if (!article) return;
  document.getElementById('chatTopic').textContent = article.title;
  const chatInput = document.getElementById('chatInput');
  chatInput.disabled = false;
  document.getElementById('chatSend').disabled = false;
  const qs = [`What is ${article.title} most known for?`, 'Explain the main concepts simply', 'Key historical facts?', 'Controversies or debates?'];
  document.getElementById('suggestedQs').innerHTML = qs.map(q => `<button class="sq-chip" onclick="askSuggested(this)">${escHtml(q)}</button>`).join('');
  const msgs = document.getElementById('chatMessages');
  if (!chatHistory.length) {
    msgs.innerHTML = '';
    addMessageRaw('ai', `I've read the full Wikipedia article on **${article.title}** — including any recent updates. Ask me anything!`);
  }
  document.getElementById('chatPopup').classList.add('open');
  chatInput.focus();
  if (initialQ) { chatInput.value = initialQ; askBarInput.value = ''; setTimeout(() => sendChat(), 80); }
}

/* closeChat: hides chat panel, returns user to article page */
function closeChat() {
  document.getElementById('chatPopup').classList.remove('open');
}

function askSuggested(btn) { document.getElementById('chatInput').value = btn.textContent; sendChat(); }

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !article) return;
  input.value = ''; input.style.height = 'auto';
  input.disabled = true; document.getElementById('chatSend').disabled = true;
  document.getElementById('chatError').innerHTML = '';
  addMessageRaw('user', msg);
  chatHistory.push({ role:'user', content:msg });
  const tid = addTyping();
  try {
    const reply = await callAI(buildMessages(msg));
    chatHistory.push({ role:'assistant', content:reply });
    removeTyping(tid);
    addMessageWordByWord('ai', reply);
  } catch(e) {
    removeTyping(tid); chatHistory.pop();
    document.getElementById('chatError').innerHTML = `<div class="err-bar">Error: ${escHtml(e.message)}</div>`;
  } finally {
    input.disabled = false; document.getElementById('chatSend').disabled = false; input.focus();
  }
}

function buildMessages(userMsg) {
  let ctx = article.plainText;
  if (ctx.length > 80000) {
    const cut = ctx.lastIndexOf('\n', 80000);
    ctx = ctx.slice(0, cut > 0 ? cut : 80000) + '\n\n[Article truncated]';
  }
  const system = `You are WikisAI — an expert assistant helping a user understand a Wikipedia article.

PRIMARY RULE: The Wikipedia article text below is your source of truth. It is fetched live and may contain information more recent than your training data. ALWAYS prioritize facts from the article. If the article mentions recent events, statistics, or developments, use them in your answer.

Article: "${article.title}"
---
${ctx}
---

Guidelines:
- Answer thoroughly using the article above
- Use **bold** for key terms, names, important facts
- Include specific dates, numbers, names from the article
- For recent info: if it's in the article, answer confidently from it
- If truly not in the article, say so briefly then add general knowledge if useful
- Be conversational but precise`;

  return [
    { role:'system', content:system },
    ...chatHistory.slice(-12),
    { role:'user', content:userMsg }
  ];
}

document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendChat(); } });
document.getElementById('chatInput').addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; });

/* ── CHAT UI HELPERS ── */
function addMessageRaw(role, text) {
  const c = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  div.innerHTML = `<div class="msg-av">${role==='user'?'You':'AI'}</div><div><div class="msg-bubble">${fmtMsg(text)}</div><div class="msg-meta">${time}</div></div>`;
  c.appendChild(div); c.scrollTop = c.scrollHeight;
}
function addMessageWordByWord(role, text) {
  const c = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const id = 'b' + Date.now();
  div.innerHTML = `<div class="msg-av">AI</div><div><div class="msg-bubble" id="${id}"><span class="cursor-blink"></span></div><div class="msg-meta">${time}</div></div>`;
  c.appendChild(div); c.scrollTop = c.scrollHeight;
  const bubble = document.getElementById(id);
  const words = text.split(' ');
  let idx = 0, rendered = '';
  const iv = setInterval(() => {
    if (idx >= words.length) { clearInterval(iv); bubble.innerHTML = fmtMsg(text); c.scrollTop = c.scrollHeight; return; }
    rendered += (rendered?' ':'')+words.slice(idx,idx+2).join(' ');
    idx += 2;
    bubble.innerHTML = fmtMsg(rendered)+'<span class="cursor-blink"></span>';
    c.scrollTop = c.scrollHeight;
  }, 45);
}
function addTyping() {
  const id = 'ty'+Date.now();
  const c = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.id = id; div.className = 'msg ai';
  div.innerHTML = `<div class="msg-av">AI</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  c.appendChild(div); c.scrollTop = c.scrollHeight;
  return id;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }
function fmtMsg(t) {
  return escHtml(t)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

async function callAI(messages) {
  const isLocal = ['localhost','127.0.0.1',''].includes(window.location.hostname);

  if (!isLocal) {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages, model:TOGETHER_MODEL, max_tokens:1500, temperature:0.45 })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||`HTTP ${res.status}`); }
    return (await res.json()).content;
  } else {
    const key = window.__DEV_KEY || '';
    if (!key) throw new Error('No key. Start the dev server: node server.js');
    const res = await fetch('https://api.together.xyz/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body: JSON.stringify({ model:TOGETHER_MODEL, messages, max_tokens:1500, temperature:0.45 })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${res.status}`); }
    return (await res.json()).choices[0].message.content.trim();
  }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripHtml(s) { return s.replace(/<[^>]+>/g,'').replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&#039;/g,"'").slice(0,90); }
</script>
